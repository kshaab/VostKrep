name: Django CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-root

      - run: flake8 --config backend/.flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: testsecret
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      DB_HOST: localhost
      DB_PORT: 5432
      DEBUG: "True"
      CORS_ALLOWED_ORIGINS: http://localhost:8000
      CSRF_TRUSTED_ORIGINS: http://localhost:8000

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - run: |
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-root

      - run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done

      - run: poetry run python backend/manage.py migrate
      - run: poetry run python backend/manage.py test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/vostkrep-frontend:latest -f frontend/Dockerfile_frontend ./frontend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/vostkrep-frontend:latest

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/vostkrep-backend:latest -f Dockerfile ./ 
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/vostkrep-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          echo "${{ secrets.SSH_KEY }}" > key
          chmod 600 key
          
          ssh -i key -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose pull
            docker compose up -d --build
          EOF

