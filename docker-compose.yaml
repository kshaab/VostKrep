services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    entrypoint: [ "/project/entrypoint.sh" ]
    env_file:
      - ./backend/.env
    volumes:
      - static_volume:/project/static
      - media_volume:/project/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile_frontend
    restart: always
    command: npm run start
    env_file:
      - ./frontend/.env.local
    depends_on:
      - web
    networks:
      - app_network

  db:
    image: postgres:17
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

  celery:
    image: "${DOCKER_HUB_USERNAME}/vostkrep:latest"
    restart: always
    command: celery -A project worker -l INFO
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - app_network

  celery_beat:
    image: "${DOCKER_HUB_USERNAME}/vostkrep:latest"
    restart: always
    command: celery -A project beat -l INFO
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    networks:
      - app_network

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx_conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx_conf/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - web
      - frontend
    networks:
      - app_network

networks:
  app_network:

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: