server {
    listen 80;
    server_name vostkrep.ru www.vostkrep.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vostkrep.ru www.vostkrep.ru;

    ssl_certificate /etc/letsencrypt/live/vostkrep.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vostkrep.ru/privkey.pem;

    client_max_body_size 50M;

    location /admin/ {
    proxy_pass http://web:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Ssl on;
    proxy_set_header X-Forwarded-Host $host;
   }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Host $host;
    }


    location /static/ {
        alias /project/src/static/;
    }

    location /media/ {
        alias /project/backend/src/media/;
    }


    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Host $host;
    }
}